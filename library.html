<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noah's Book Reviews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="home-link" aria-label="Back to home">&larr; Home</a>
      <h1 class="site-title"><a href="index.html">Noah's Book Reviews</a></h1>
      <p class="site-tagline">A personal shelf of books worth reading - and a few thoughts on each.</p>
    </div>
  </header>

  <main class="container" id="library-view">
    <section class="controls">
      <input
        type="search"
        id="search"
        class="search-input"
        placeholder="Search by title, author, or genre…"
        aria-label="Search books"
      />
      <div class="filter-group">
        <label for="genre-filter">Genre:</label>
        <select id="genre-filter" aria-label="Filter by genre">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="rating-filter">Min rating:</label>
        <select id="rating-filter" aria-label="Filter by minimum rating">
          <option value="0">Any</option>
          <option value="3">3+ stars</option>
          <option value="4">4+ stars</option>
          <option value="5">5 stars</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sort">Sort:</label>
        <select id="sort" aria-label="Sort books">
          <option value="recent">Recently reviewed</option>
          <option value="rating-desc">Rating (high to low)</option>
          <option value="rating-asc">Rating (low to high)</option>
          <option value="title">Title (A–Z)</option>
          <option value="author">Author (A–Z)</option>
        </select>
      </div>
    </section>

    <section id="book-grid" class="book-grid" aria-live="polite"></section>

    <p id="empty-state" class="empty-state" hidden>No books match your filters.</p>
  </main>

  <main class="container article-view" id="article-view" hidden>
    <nav class="article-nav-top" aria-label="Article navigation">
      <a href="#" class="back-link" id="back-link">&larr; Back to all reviews</a>
    </nav>
    <article id="article-body" class="article"></article>
    <nav class="article-nav-bottom" aria-label="More reviews">
      <a href="#" class="nav-button" id="prev-link" hidden>&larr; <span></span></a>
      <a href="#" class="nav-button center" id="library-link">All reviews</a>
      <a href="#" class="nav-button" id="next-link" hidden><span></span> &rarr;</a>
    </nav>
  </main>

  <div id="modal" class="modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close></div>
    <article class="modal-content">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </article>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>Built by Noah. Add your own books in <code>data/books.js</code>.</p>
    </div>
  </footer>

  <script src="data/books.js"></script>
  <script src="js/library.js"></script>
</body>
</html>
