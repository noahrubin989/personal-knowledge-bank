<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noah's Book Reviews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="assets/landing.css" />
</head>
<body>
  <section class="landing">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="hero">
      <span class="eyebrow">A Personal Library</span>
      <h1>Noah's Notebook & Book Reviews</h1>
      <p class="typewriter-line">
        <span id="typewriter" aria-live="polite"></span><span class="cursor" aria-hidden="true"></span>
      </p>
      <div class="cta-row">
        <a href="library.html" class="cta-button">
          Read the book reviews <span class="arrow">&rarr;</span>
        </a>
        <a href="blog.html" class="cta-button">
          Read the blog <span class="arrow">&rarr;</span>
        </a>
        <a href="https://github.com/noahrubin989/book-reviews" class="cta-button ghost" target="_blank" rel="noopener">
          View on GitHub
        </a>
      </div>
    </div>

    <p class="scroll-hint">Curated by Noah</p>
  </section>

  <script>
    (function () {
      const phrases = [
        "Find your next great read.",
        "Honest reviews. No spoilers.",
        "From classics to science fiction.",
        "Books worth your time.",
        "One reader's shelf, opened up."
      ];

      const el = document.getElementById('typewriter');
      const TYPE_MS = 70;
      const DELETE_MS = 35;
      const PAUSE_AFTER_TYPE = 1700;
      const PAUSE_AFTER_DELETE = 350;

      let phraseIndex = 0;
      let charIndex = 0;
      let deleting = false;

      function tick() {
        const phrase = phrases[phraseIndex];
        if (!deleting) {
          charIndex++;
          el.textContent = phrase.slice(0, charIndex);
          if (charIndex === phrase.length) {
            deleting = true;
            return setTimeout(tick, PAUSE_AFTER_TYPE);
          }
          return setTimeout(tick, TYPE_MS);
        } else {
          charIndex--;
          el.textContent = phrase.slice(0, charIndex);
          if (charIndex === 0) {
            deleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
            return setTimeout(tick, PAUSE_AFTER_DELETE);
          }
          return setTimeout(tick, DELETE_MS);
        }
      }

      // Respect reduced-motion users: just show the first phrase, no animation.
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) {
        el.textContent = phrases[0];
      } else {
        setTimeout(tick, 600);
      }
    })();
  </script>
</body>
</html>
